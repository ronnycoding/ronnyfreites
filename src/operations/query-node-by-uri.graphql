query GetNodeByURI($uri: String!) {
  nodeByUri(uri: $uri) {
    __typename
    isContentNode
    isTermNode
    ... on Post {
      id
      title
      date
      uri
      excerpt
      content
      categories {
        nodes {
          name
          uri
        }
      }
      featuredImage {
        node {
          srcSet
          sourceUrl
          altText
          mediaDetails {
            height
            width
          }
        }
      }
    }
    ... on Page {
      id
      title
      uri
      date
      content
    }
    ... on Category {
      id
      name
      posts {
        nodes {
          date
          title
          excerpt
          uri
          categories {
            nodes {
              name
              uri
            }
          }
          featuredImage {
            node {
              srcSet
              sourceUrl
              altText
              mediaDetails {
                height
                width
              }
            }
          }
        }
      }
    }
  }
}
