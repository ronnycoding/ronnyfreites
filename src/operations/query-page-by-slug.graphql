query GetPageBySlug($slug: ID!) {
  page(id: $slug, idType: URI) {
    id
    title
    date
    uri
    slug
    content
    featuredImage {
      node {
        srcSet
        sourceUrl
        altText
        mediaDetails {
          height
          width
        }
      }
    }
    seo {
      fullHead
    }
  }
}
